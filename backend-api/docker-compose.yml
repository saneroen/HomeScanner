services:
  db:
    image: postgres:16-alpine
    container_name: homescanner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homescanner
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homescanner"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homescanner-api
    restart: unless-stopped
    environment:
      APP_NAME: HomeScanner Backend API
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/homescanner
      OPENAI_API_KEY: ${OPENAI_API_KEY:-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}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1-mini}
      RECEIPT_UPLOAD_DIR: ${RECEIPT_UPLOAD_DIR:-/app/data/receipts}
    ports:
      - "8000:8000"
    volumes:
      - receipt_images:/app/data/receipts
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
  receipt_images:
